<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 18 18" width="18" height="18">
  <!-- Shower pipe arm -->
  <line x1="2.5" y1="2.5" x2="6.5" y2="6.5" stroke="black" stroke-width="1.1" stroke-linecap="round"/>
  <!-- Shower head nozzle -->
  <rect x="6" y="6" width="4.5" height="2.2" rx="0.7" fill="black"/>
  <!-- Water drops -->
  <line x1="6.8"  y1="9.5" x2="6.2"  y2="12" stroke="black" stroke-width="0.9" stroke-linecap="round"/>
  <line x1="8.25" y1="9.5" x2="7.65" y2="12" stroke="black" stroke-width="0.9" stroke-linecap="round"/>
  <line x1="9.7"  y1="9.5" x2="9.1"  y2="12" stroke="black" stroke-width="0.9" stroke-linecap="round"/>
  <!-- Eighth note stem -->
  <line x1="14.5" y1="4.5" x2="14.5" y2="10.5" stroke="black" stroke-width="1" stroke-linecap="round"/>
  <!-- Note head -->
  <ellipse cx="13.3" cy="10.5" rx="1.4" ry="1" transform="rotate(-18 13.3 10.5)" fill="black"/>
  <!-- Note flag -->
  <path d="M14.5 4.5 Q17 4 17 6.5" stroke="black" stroke-width="0.9" fill="none" stroke-linecap="round"/>
</svg>
